<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>perlin grid</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;font-family:'Courier New',monospace;font-size:9px;color:#888;padding:14px;}
#grid{display:grid;width:min(500px,82vw);aspect-ratio:1;margin:0 auto 14px;overflow:hidden;transition:none}
#grid div{transition:none}
.ctrl{display:flex;flex-wrap:wrap;gap:7px 14px;max-width:min(500px,82vw);margin:0 auto}
.blk{background:#111;border:0.5px solid #1e1e1e;border-radius:4px;padding:7px 10px;flex:1;min-width:130px}
.bttl{font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:#444;margin-bottom:7px;border-bottom:.5px solid #1a1a1a;padding-bottom:4px}
.sr{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.sr label{width:70px;font-size:8px;color:#555;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr input[type=range]{flex:1;min-width:0;-webkit-appearance:none;appearance:none;height:2px;background:#1e1e1e;border-radius:1px;outline:none;cursor:pointer}
.sr input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:7px;height:7px;border-radius:50%;background:#888;cursor:pointer}
.sr input[type=range]::-moz-range-thumb{width:7px;height:7px;border-radius:50%;background:#888;cursor:pointer;border:none}
.sr .v{width:28px;text-align:right;font-size:8px;color:#aaa;flex-shrink:0}
.toggles{display:flex;flex-wrap:wrap;gap:5px}
.tog{cursor:pointer;padding:4px 9px;border:.5px solid #222;border-radius:3px;font-size:8px;color:#444;user-select:none;transition:all .15s}
.tog.on{border-color:#666;color:#ccc;background:#1a1a1a}
</style>
</head>
<body>

<div id="grid"></div>

<div class="ctrl">
  <div class="blk">
    <div class="bttl">View</div>
    <div class="toggles">
      <div class="tog on" id="tGrid" onclick="toggleGrid()">grid lines</div>
      <div class="tog on" id="tSize" onclick="toggleSize()">size anim</div>
      <div class="tog on" id="tNoise" onclick="toggleNoise()">noise drift</div>
    </div>
  </div>

  <div class="blk">
    <div class="bttl">Grid</div>
    <div class="sr"><label>cols</label><input type="range" min="2" max="40" step="1" value="20" id="sCols"><span class="v" id="vCols">20</span></div>
    <div class="sr"><label>rows</label><input type="range" min="2" max="40" step="1" value="20" id="sRows"><span class="v" id="vRows">20</span></div>
    <div class="sr"><label>gap px</label><input type="range" min="0" max="6" step="0.5" value="0" id="sGap"><span class="v" id="vGap">0</span></div>
    <div class="sr"><label>line α</label><input type="range" min="0" max="1" step="0.01" value="0.25" id="sLineA"><span class="v" id="vLineA">.25</span></div>
    <div class="sr"><label>line w</label><input type="range" min="0.5" max="4" step="0.5" value="1" id="sLineW"><span class="v" id="vLineW">1</span></div>
  </div>

  <div class="blk">
    <div class="bttl">Size wave</div>
    <div class="sr"><label>amplitude</label><input type="range" min="0" max="2" step="0.01" value="0.45" id="sAmp"><span class="v" id="vAmp">.45</span></div>
    <div class="sr"><label>frequency</label><input type="range" min="0.1" max="5" step="0.05" value="1" id="sFreq"><span class="v" id="vFreq">1.0</span></div>
    <div class="sr"><label>min size</label><input type="range" min="0.01" max="0.5" step="0.01" value="0.05" id="sMin"><span class="v" id="vMin">.05</span></div>
    <div class="sr"><label>wave mix</label><input type="range" min="0" max="1" step="0.01" value="0.4" id="sWaveMix"><span class="v" id="vWaveMix">.40</span></div>
  </div>

  <div class="blk">
    <div class="bttl">Noise</div>
    <div class="sr"><label>scale</label><input type="range" min="0.5" max="12" step="0.1" value="3.5" id="sScale"><span class="v" id="vScale">3.5</span></div>
    <div class="sr"><label>drift X</label><input type="range" min="0" max="0.0005" step="0.000005" value="0.000055" id="sDX"><span class="v" id="vDX">55</span></div>
    <div class="sr"><label>drift Y</label><input type="range" min="0" max="0.0005" step="0.000005" value="0.000042" id="sDY"><span class="v" id="vDY">42</span></div>
    <div class="sr"><label>octaves</label><input type="range" min="1" max="6" step="1" value="4" id="sOct"><span class="v" id="vOct">4</span></div>
    <div class="sr"><label>brightness</label><input type="range" min="0.3" max="1" step="0.01" value="0.53" id="sBright"><span class="v" id="vBright">.53</span></div>
  </div>
</div>

<script>
const gEl=document.getElementById('grid');

// ── State ────────────────────────────────────────────────────────────────────
let showGrid=true,showSize=true,showNoise=true;
let COLS=20,ROWS=20;
let divs=[],cW=[],rW=[];

function sl(id){return parseFloat(document.getElementById(id).value)}
function sv(id,v){document.getElementById(id).textContent=v}

// ── Toggles ──────────────────────────────────────────────────────────────────
function toggleGrid(){
  showGrid=!showGrid;
  document.getElementById('tGrid').classList.toggle('on',showGrid);
  applyBorder();
}
function toggleSize(){
  showSize=!showSize;
  document.getElementById('tSize').classList.toggle('on',showSize);
}
function toggleNoise(){
  showNoise=!showNoise;
  document.getElementById('tNoise').classList.toggle('on',showNoise);
}

function applyBorder(){
  const lw=sl('sLineW'),la=sl('sLineA');
  const brd=showGrid?`${lw}px solid rgba(255,255,255,${la})`:'none';
  divs.forEach(d=>d.style.outline=brd);
}

// ── Value noise ───────────────────────────────────────────────────────────────
function s3(t){return t*t*(3-2*t)}
const R=256,RM=R-1;
const V=new Float32Array(R*R);
for(let i=0;i<V.length;i++)V[i]=Math.random()*2-1;
function vn(x,y){
  const xi=((Math.floor(x)%R)+R)&RM,yi=((Math.floor(y)%R)+R)&RM;
  const xf=x-Math.floor(x),yf=y-Math.floor(y);
  const u=s3(xf),v=s3(yf),xi1=(xi+1)&RM,yi1=(yi+1)&RM;
  return (V[yi*R+xi]*(1-u)+V[yi*R+xi1]*u)*(1-v)+(V[yi1*R+xi]*(1-u)+V[yi1*R+xi1]*u)*v;
}
function fbm(x,y,oct){
  let s=0,a=.5,f=1;
  for(let i=0;i<oct;i++){s+=vn(x*f,y*f)*a;a*=.5;f*=2.1;}
  return s;
}

const HEX=Array.from({length:256},(_,i)=>{const h=i.toString(16).padStart(2,'0');return`#${h}${h}${h}`});

// ── Build wave params ─────────────────────────────────────────────────────────
function mkWave(){
  return {
    base:1,
    w:[{ph:Math.random()*Math.PI*2,fr:.00007+Math.random()*.0012,am:.15+Math.random()*.45},
       {ph:Math.random()*Math.PI*2,fr:.00004+Math.random()*.0006,am:.1+Math.random()*.25}]
  };
}

// ── Rebuild grid ──────────────────────────────────────────────────────────────
function rebuild(){
  COLS=parseInt(sl('sCols'));ROWS=parseInt(sl('sRows'));
  gEl.innerHTML='';
  divs=Array.from({length:COLS*ROWS},()=>{
    const d=document.createElement('div');
    gEl.appendChild(d);
    return d;
  });
  const gap=sl('sGap');
  gEl.style.cssText=`display:grid;grid-template-columns:repeat(${COLS},1fr);grid-template-rows:repeat(${ROWS},1fr);width:min(500px,82vw);aspect-ratio:1;margin:0 auto 14px;overflow:hidden;gap:${gap}px`;
  cW=Array.from({length:COLS},mkWave);
  rW=Array.from({length:ROWS},mkWave);
  applyBorder();
}

// ── Slider wiring ─────────────────────────────────────────────────────────────
document.getElementById('sCols').addEventListener('input',function(){sv('vCols',this.value);rebuild()});
document.getElementById('sRows').addEventListener('input',function(){sv('vRows',this.value);rebuild()});
document.getElementById('sGap').addEventListener('input',function(){sv('vGap',this.value);rebuild()});
document.getElementById('sLineA').addEventListener('input',function(){sv('vLineA',parseFloat(this.value).toFixed(2));applyBorder()});
document.getElementById('sLineW').addEventListener('input',function(){sv('vLineW',this.value);applyBorder()});
document.getElementById('sAmp').addEventListener('input',function(){sv('vAmp',parseFloat(this.value).toFixed(2))});
document.getElementById('sFreq').addEventListener('input',function(){sv('vFreq',parseFloat(this.value).toFixed(2))});
document.getElementById('sMin').addEventListener('input',function(){sv('vMin',parseFloat(this.value).toFixed(2))});
document.getElementById('sWaveMix').addEventListener('input',function(){sv('vWaveMix',parseFloat(this.value).toFixed(2))});
document.getElementById('sScale').addEventListener('input',function(){sv('vScale',this.value)});
document.getElementById('sDX').addEventListener('input',function(){sv('vDX',(parseFloat(this.value)*1e6|0)+'')});
document.getElementById('sDY').addEventListener('input',function(){sv('vDY',(parseFloat(this.value)*1e6|0)+'')});
document.getElementById('sOct').addEventListener('input',function(){sv('vOct',this.value)});
document.getElementById('sBright').addEventListener('input',function(){sv('vBright',parseFloat(this.value).toFixed(2))});

// ── Main loop ─────────────────────────────────────────────────────────────────
let ox=0,oy=0;
function loop(t){
  const amp=sl('sAmp'),freq=sl('sFreq'),minS=sl('sMin'),wmix=sl('sWaveMix');
  const scale=sl('sScale'),oct=parseInt(sl('sOct')),bright=sl('sBright');

  if(showSize){
    const cR=cW.map(c=>Math.max(minS,c.base+
      (c.w[0].am*amp)*Math.sin(c.w[0].ph+c.w[0].fr*t*freq*1000)+
      (c.w[1].am*amp*wmix)*Math.sin(c.w[1].ph+c.w[1].fr*t*freq*1000)));
    const rR=rW.map(r=>Math.max(minS,r.base+
      (r.w[0].am*amp)*Math.sin(r.w[0].ph+r.w[0].fr*t*freq*1000)+
      (r.w[1].am*amp*wmix)*Math.sin(r.w[1].ph+r.w[1].fr*t*freq*1000)));
    const cS=cR.reduce((a,b)=>a+b),rS=rR.reduce((a,b)=>a+b);
    gEl.style.gridTemplateColumns=cR.map(v=>(v/cS*100).toFixed(2)+'%').join(' ');
    gEl.style.gridTemplateRows=rR.map(v=>(v/rS*100).toFixed(2)+'%').join(' ');
  } else {
    gEl.style.gridTemplateColumns=`repeat(${COLS},1fr)`;
    gEl.style.gridTemplateRows=`repeat(${ROWS},1fr)`;
  }

  if(showNoise){
    ox+=sl('sDX');oy+=sl('sDY');
  }

  let k=0;
  for(let r=0;r<ROWS;r++){
    const ny=r/ROWS*scale+oy;
    for(let c=0;c<COLS;c++){
      const n=fbm(c/COLS*scale+ox,ny,oct);
      const v=Math.min(255,Math.max(0,Math.round((n*bright+.5)*240)));
      divs[k++].style.background=HEX[v];
    }
  }
  requestAnimationFrame(loop);
}

rebuild();
requestAnimationFrame(loop);
</script>
</body>
</html>
