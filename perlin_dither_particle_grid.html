
<div style="padding:1rem 0;display:flex;gap:28px;align-items:flex-start;flex-wrap:wrap">
<div>
<canvas id="cv" width="60" height="60" style="display:block;width:60px;height:60px;image-rendering:pixelated"></canvas>
<p style="font-size:10px;font-family:var(--font-mono);color:var(--color-text-secondary);margin:4px 0 0">60×60px</p>
</div>
<div>
<canvas id="zv" width="60" height="60" style="display:block;width:480px;height:480px;image-rendering:pixelated"></canvas>
<p style="font-size:10px;font-family:var(--font-mono);color:var(--color-text-secondary);margin:4px 0 0">8× zoom — live</p>
</div>
</div>
<script>
const W=60,H=60,c=document.getElementById('cv'),z=document.getElementById('zv');
const cx=c.getContext('2d'),zx=z.getContext('2d');
zx.imageSmoothingEnabled=false;

const CX=[0,15,40],CY=[0,18,40],CW=[15,25,20],CH=[18,22,20];

function hash(x,y,s){
  let n=((x*1619^y*31337^s*1013)>>>0);
  n=(n^n>>>14)*0x45d9f3b>>>0;
  n=(n^n>>>13)*0xc2b2ae35>>>0;
  return(n>>>0)/0xffffffff;
}
function sm(t){return t*t*(3-2*t)}
function vn(x,y,s){
  const xi=Math.floor(x),yi=Math.floor(y),fx=sm(x-xi),fy=sm(y-yi);
  return hash(xi,yi,s)*(1-fx)*(1-fy)+hash(xi+1,yi,s)*fx*(1-fy)
        +hash(xi,yi+1,s)*(1-fx)*fy+hash(xi+1,yi+1,s)*fx*fy;
}
function fbm(x,y,s,o){
  let v=0,a=.5,f=1,m=0;
  for(let i=0;i<o;i++){v+=vn(x*f,y*f,s+i*71)*a;m+=a;a*=.5;f*=2}
  return v/m;
}
const BY=[0,8,2,10,12,4,14,6,3,11,1,9,15,7,13,5];
function byr(x,y){return BY[((y&3)<<2)|(x&3)]/16}

const CFG=[
  [.14,.6,3,0,  0],[.22,1.1,4,1,100],[.36,1.8,2,2,200],
  [.18,1.4,4,0,300],[.10,.4,5,1,400],[.28,1.6,3,2,500],
  [.20,2.0,2,0,600],[.16,.8,4,1,700],[.40,1.3,3,2,800]
];

function gpx(ci,ri,px,py,t){
  const[sc,sp,oc,dm,sd]=CFG[ri*3+ci];
  const v=fbm((px+t*sp*.25)*sc,(py+t*sp*.15)*sc,sd,oc);
  if(dm===0)return v>byr(px,py)?1:0;
  if(dm===1)return v>.5?1:0;
  return v>.5?(((px+py)&1)?1:0):(((px+py)&1)?0:1);
}
function cellOf(px,py){
  return[px<15?0:px<40?1:2,py<18?0:py<40?1:2];
}

const pts=[],SR=0.09;
const buf=cx.createImageData(W,H),D=buf.data;
let t=0;
const VBX=[15,40],HBY=[18,40];

(function loop(){
  for(let ri=0;ri<3;ri++) for(let ci=0;ci<3;ci++){
    const x0=CX[ci],y0=CY[ri],x1=x0+CW[ci],y1=y0+CH[ri];
    for(let py=y0;py<y1;py++) for(let px=x0;px<x1;px++){
      const g=gpx(ci,ri,px,py,t)?255:0,i=(py*W+px)*4;
      D[i]=D[i+1]=D[i+2]=g;D[i+3]=255;
    }
  }
  for(const p of pts){
    const px=Math.round(p.x)|0,py=Math.round(p.y)|0;
    if(px>=0&&px<W&&py>=0&&py<H){const i=(py*W+px)*4;D[i]=D[i+1]=D[i+2]=255-D[i];D[i+3]=255}
  }
  const ti=t>>1;
  for(const bx of VBX) for(let py=0;py<H;py++){
    const g=((py+ti)&3)<2?255:0,i=(py*W+bx)*4;
    D[i]=D[i+1]=D[i+2]=g;D[i+3]=255;
  }
  for(const by of HBY) for(let px=0;px<W;px++){
    const g=((px+ti)&3)<2?255:0,i=(by*W+px)*4;
    D[i]=D[i+1]=D[i+2]=g;D[i+3]=255;
  }

  cx.putImageData(buf,0,0);
  zx.clearRect(0,0,480,480);
  zx.drawImage(c,0,0,480,480);

  for(const bx of VBX){
    for(let py=0;py<H;py++){
      if(py===18||py===40) continue;
      if(bx>0){
        const[lc,lr]=cellOf(bx-1,py);
        if(gpx(lc,lr,bx-1,py,t)&&Math.random()<SR)
          pts.push({x:bx+1,y:py,vx:.8+Math.random()*.5,vy:(Math.random()-.5)*.5,life:7+Math.random()*9|0});
      }
      if(bx+1<W){
        const[rc,rr]=cellOf(bx+1,py);
        if(gpx(rc,rr,bx+1,py,t)&&Math.random()<SR)
          pts.push({x:bx-1,y:py,vx:-(0.8+Math.random()*.5),vy:(Math.random()-.5)*.5,life:7+Math.random()*9|0});
      }
    }
  }
  for(const by of HBY){
    for(let px=0;px<W;px++){
      if(px===15||px===40) continue;
      if(by>0){
        const[tc,tr]=cellOf(px,by-1);
        if(gpx(tc,tr,px,by-1,t)&&Math.random()<SR)
          pts.push({x:px,y:by+1,vx:(Math.random()-.5)*.5,vy:.8+Math.random()*.5,life:7+Math.random()*9|0});
      }
      if(by+1<H){
        const[bc,br]=cellOf(px,by+1);
        if(gpx(bc,br,px,by+1,t)&&Math.random()<SR)
          pts.push({x:px,y:by-1,vx:(Math.random()-.5)*.5,vy:-(0.8+Math.random()*.5),life:7+Math.random()*9|0});
      }
    }
  }

  for(let i=pts.length-1;i>=0;i--){
    const p=pts[i];
    p.vx+=(Math.random()-.5)*.08;p.vy+=(Math.random()-.5)*.08;
    const sp=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    if(sp>2){p.vx=p.vx/sp*2;p.vy=p.vy/sp*2}
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0||p.x<0||p.x>=W||p.y<0||p.y>=H)pts.splice(i,1);
  }
  if(pts.length>1800)pts.splice(0,pts.length-1800);
  t++;
  requestAnimationFrame(loop);
})();
</script>
