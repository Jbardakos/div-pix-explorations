function loop(t){
  // sine grid
  const cR=cW.map(c=>Math.max(.05,c.base+c.w[0].am*Math.sin(c.w[0].ph+c.w[0].fr*t)+c.w[1].am*Math.sin(c.w[1].ph+c.w[1].fr*t)));

  const cS=cR.reduce((a,b)=>a+b),rS=rR.reduce((a,b)=>a+b);

  // colors
  if(loaded){
    for(let i=0;i<N;i++){
      const r=colors[i*3],gv=colors[i*3+1],b=colors[i*3+2];
      divs[i].style.background=`rgb(${r},${gv},${b})`;
    }
    loaded=false; // set once, then never again for colors
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
})();
</script>
