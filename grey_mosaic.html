<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grey Mosaic</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cell: 80px;
    --gap: 0px;
    --bg: #111;
  }

  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
  }

  .label {
    color: #444;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, var(--cell));
    grid-template-rows: repeat(5, var(--cell));
    gap: var(--gap);
  }

  .cell {
    width: var(--cell);
    height: var(--cell);
    transition: transform 0.25s ease, filter 0.25s ease;
    cursor: crosshair;
  }

  .cell:hover {
    transform: scale(1.12);
    filter: brightness(1.4);
    z-index: 10;
    position: relative;
  }

  .btn {
    margin-top: 24px;
    background: transparent;
    border: 1px solid #333;
    color: #555;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 8px 20px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn:hover {
    border-color: #888;
    color: #aaa;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .cell { animation: fadeIn 0.4s ease both; }
</style>
</head>
<body>

<p class="label">5 × 5 · grey field</p>

<div class="grid" id="grid"></div>

<button class="btn" onclick="generate()">regenerate</button>

<script>
  function randGrey() {
    const v = Math.floor(Math.random() * 220) + 10; // 10–230
    return `rgb(${v},${v},${v})`;
  }

  function generate() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (let i = 0; i < 25; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.style.background = randGrey();
      const row = Math.floor(i / 5), col = i % 5;
      const dist = Math.max(Math.abs(row - 2), Math.abs(col - 2)); // Chebyshev distance from center
      cell.style.animationDelay = `${dist * 80}ms`;
      grid.appendChild(cell);
    }
  }

  generate();
</script>

</body>
</html>
